        <style>
            #loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;

                display: flex;
                justify-content: center;
                align-items: center;

                opacity: 0;
                pointer-events: none;
                /* background-color: black; */
                transition: opacity 2s ease-in-out;

                z-index: 100;
            }

            #loading-screen.loading {
                opacity: 1;
                pointer-events: initial;
                transition: opacity 2s ease-in-out;
            }

            #loading-screen.loading ~ *:not(#bg-canvas) {
                opacity: 0;
                transition: opacity 2s ease-in-out;
            }

            #loading-screen ~ *:not(#bg-canvas) {
                opacity: 1;
                transition: opacity 2s ease-in-out;
            }

            #loading-screen.loading svg {
                max-height: 33%;
                max-width: 75%;
            }

            #loading-screen.loading svg path {
                --length: 0;
                --delay: 0;

                stroke: white;
                stroke-dasharray: var(--length);
                stroke-dashoffset: 0;

                animation: animate-loading-screen 2.5s infinite ease-in
                    var(--delay);
            }

            @keyframes animate-loading-screen {
                0%,
                100% {
                    stroke-dashoffset: var(--length);
                }

                33%,
                66% {
                    stroke-dashoffset: 0;
                }
            }
        </style>

        <script>
            function addLoadEvent(func) {
                var oldonload = window.onload;
                if (typeof window.onload != "function") {
                    window.onload = func;
                } else {
                    window.onload = function () {
                        if (oldonload) {
                            oldonload();
                        }
                        func();
                    };
                }
            }

            const loadingScreen = document.getElementById("loading-screen");
            const paths = loadingScreen.querySelectorAll("svg path");

            paths.forEach((path, i) => {
                const length = Math.floor(path.getTotalLength());
                path.style.setProperty("--length", length);
                path.style.setProperty("--delay", i * 200 + "ms");
            });
            window.addEventListener("load", () =>
                loadingScreen.classList.remove("loading")
            );
        </script>
